@if (!isLoginRoute()) {
  <nav class="navbar navbar-expand-lg shadow-sm splitgroup-nav">
    <div class="container-lg">

      <!-- Logo -->
      <a class="navbar-brand d-flex align-items-center gap-2" routerLink="/gastos">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4"/>
            <line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/>
          </svg>
        </div>
        <span class="brand-text">SplitGroup</span>
      </a>

      <!-- Toggle móvil -->
      <button class="navbar-toggler border-0" type="button"
              data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <!-- Links principales -->
        <ul class="navbar-nav mx-auto gap-1">
          <li class="nav-item">
            <a class="nav-link nav-pill" routerLink="/grupos" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              Grupos
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-pill" routerLink="/perfil" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
              Perfil
            </a>
          </li>
        </ul>

        <!-- Logout -->
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <button class="btn btn-logout btn-sm d-flex align-items-center gap-2" (click)="logout()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Cerrar sesión
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container-lg my-4">
    <router-outlet></router-outlet>
  </main>
} @else {
  <router-outlet></router-outlet>
}
